- type: entity
  name: experimental communications jammer
  parent: RadioJammer
  id: STRadioJammerIndustrial
  description: This device is an improved version of a standard communications jammer. Its range is increased, but its power consumption is also higher.
  components:
  - type: Sprite
    sprite: _Stories/Objects/Devices/jammer_ind.rsi
  - type: RadioJammer
    settings:
    - wattage: 3
      range: 6
      message: radio-jammer-component-set-message-low
      name: radio-jammer-component-setting-low
    - wattage: 6
      range: 12
      message: radio-jammer-component-set-message-medium
      name: radio-jammer-component-setting-medium
    - wattage: 12
      range: 24
      message: radio-jammer-component-set-message-high
      name: radio-jammer-component-setting-high
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHigh
