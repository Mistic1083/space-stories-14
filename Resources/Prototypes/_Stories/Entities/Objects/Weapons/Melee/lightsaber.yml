- type: entity
  name: double-bladed lightsaber
  parent: BaseLightsaber
  id: LightsaberDouble
  description: A lightsaber variant characterized by blades emanating from both sides of the hilt.
  components:
  - type: ItemToggleActiveSound
    activeSound:
      path: /Audio/Weapons/ebladehum.ogg
      params:
        volume: 3
  - type: Item
    size: Small
    sprite: _Stories/Objects/Weapons/Melee/e_sword_double-inhands.rsi
  - type: Sprite
    sprite: Objects/Weapons/Melee/e_sword_double.rsi
    layers:
      - state: e_sword_double
      - state: e_sword_double_blade
        color: "#FFFFFF"
        visible: false
        shader: unshaded
        map: [ "blade" ]

